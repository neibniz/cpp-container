name: Bazel Runner Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: bazel-build
          load: true
          tags: bazel-build:ci
          cache-from: type=gha,scope=bazel-runner-smoke
          cache-to: type=gha,mode=max,scope=bazel-runner-smoke

      - name: Verify bazel-build
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            bazel-build:ci \
            bash -lc '
              set -Eeuo pipefail
              command -v bazelisk
              bazel --version
              buf --version
              buildifier --version
              ! command -v gcc
              ! command -v g++
              ! command -v clang
              ! command -v clang++
            '
